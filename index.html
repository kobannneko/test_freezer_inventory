<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ふりこれ</title>
  <meta name="theme-color" content="#f7ddea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ふりこれ" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/style.css?v=3.0" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Freezer Inventory</p>
        <h1>ふりこれ</h1>
        <p class="lead">冷凍庫の「ある・使う・買わない」を、ふたりで共有。</p>
      </div>
      <div class="app-badge">v3.0</div>
    </header>

    <main id="mainApp" class="hidden">
      <section class="toolbar card">
        <div class="summary">
          <span id="itemCount">0件</span>
          <span id="syncStatus">同期待ち</span>
        </div>
        <div class="mode-tabs">
          <button id="displayTab" class="tab active" type="button">表示</button>
          <button id="inputTab" class="tab" type="button">入力</button>
        </div>
      </section>

      <section id="migrationCard" class="card migration-card hidden">
        <div>
          <h2>ローカルデータを移行しますか？</h2>
          <p class="muted">この端末にv1のデータが残っています。Firebaseへコピーすると共有できます。</p>
        </div>
        <div class="row-actions">
          <button id="migrateBtn" class="primary" type="button">Firebaseへ移行</button>
          <button id="dismissMigrationBtn" class="ghost" type="button">あとで</button>
        </div>
      </section>

      <section id="displayPanel">
        <section class="card filters">
          <input id="displaySearch" placeholder="在庫を検索" />
          <select id="displayCategory">
            <option value="all">すべて</option>
              <option>鶏肉</option>
              <option>豚肉</option>
              <option>牛肉</option>
              <option>加工肉</option>
              <option>魚介類</option>
              <option>野菜</option>
              <option>主食</option>
              <option>冷凍食品</option>
              <option>アイス</option>
              <option>お菓子</option>
              <option>調味料</option>
              <option>作り置き</option>
              <option>その他</option>
          </select>
          <select id="displaySort">
            <option value="ageDesc">古い順</option>
            <option value="ageAsc">新しい順</option>
            <option value="category">カテゴリ順</option>
            <option value="name">名前順</option>
            <option value="quantityDesc">数量が多い順</option>
            <option value="quantityAsc">数量が少ない順</option>
          </select>
        </section>

        <section id="displayList" class="list"></section>
      </section>

      <section id="inputPanel" class="hidden">
        <section id="formCard" class="card">
          <h2 id="formTitle">在庫を追加</h2>
          <form id="itemForm">
            <input type="hidden" id="editingId" />
            <div class="form-grid">
              <label>品名
                <input id="nameInput" required placeholder="例：鶏むね肉" autocomplete="off" />
              </label>
              <label>カテゴリ
                <select id="categoryInput">
              <option>鶏肉</option>
              <option>豚肉</option>
              <option>牛肉</option>
              <option>加工肉</option>
              <option>魚介類</option>
              <option>野菜</option>
              <option>主食</option>
              <option>冷凍食品</option>
              <option>アイス</option>
              <option>お菓子</option>
              <option>調味料</option>
              <option>作り置き</option>
              <option>その他</option>
                </select>
              </label>
              <label>数量
                <input id="quantityInput" type="number" min="0" step="0.25" value="1" inputmode="decimal" />
              </label>
              <label>単位
                <select id="unitInput">
                  <option>個</option>
                  <option>袋</option>
                  <option>パック</option>
                  <option>食分</option>
                  <option>本</option>
                  <option>枚</option>
                </select>
              </label>
              <label>冷凍日
                <input id="frozenDateInput" type="date" />
              </label>
              <label>保管場所
                <select id="locationInput">
                  <option>未設定</option>
                  <option>上段</option>
                  <option>中段</option>
                  <option>下段</option>
                  <option>ドアポケット</option>
                  <option>別冷凍庫</option>
                </select>
              </label>
            </div>
            <label>メモ
              <textarea id="memoInput" rows="2" placeholder="例：200g単位、下味冷凍、早めに使う"></textarea>
            </label>
            <div class="form-actions">
              <button class="primary" type="submit">保存</button>
              <button id="cancelEditBtn" class="ghost hidden" type="button">編集をキャンセル</button>
            </div>
          </form>
        </section>

        <section class="card recent-card">
          <div class="section-title-row">
            <h2>最近登録したもの</h2>
            <p class="muted mini">タップで再登録</p>
          </div>
          <div id="recentList" class="recent-list"></div>
        </section>
      </section>

      <section class="card backup-card">
        <h2>バックアップ</h2>
        <p class="muted">Firebaseが本体ですが、念のためJSONでも控えを取れます。</p>
        <div class="row-actions">
          <button id="exportBtn" class="ghost" type="button">JSONエクスポート</button>
          <label class="import-label">JSONインポート
            <input id="importInput" type="file" accept="application/json" hidden />
          </label>
        </div>
      </section>
    </main>

    <section id="authCard" class="card auth-card">
      <div>
        <h2>ログイン</h2>
        <p id="authStatus" class="muted">Googleアカウントでログインすると、夫婦で同じ在庫を共有できます。</p>
      </div>
      <div class="auth-actions">
        <button id="loginBtn" class="primary" type="button">Googleでログイン</button>
        <button id="logoutBtn" class="ghost hidden" type="button">ログアウト</button>
      </div>
    </section>
  </div>

  <template id="displayItemTemplate">
    <article class="item-card">
      <div class="item-head">
        <div>
          <div class="item-title"></div>
          <div class="item-meta"></div>
        </div>
        <button class="menu-btn" type="button">…</button>
      </div>
      <div class="item-middle">
        <div class="qty-display"></div>
        <div class="age-badge"></div>
      </div>
      <div class="memo-line"></div>
      <div class="qty-control">
        <button class="qty-btn dec-one" type="button">−1</button>
        <button class="qty-btn dec-quarter" type="button">−0.25</button>
        <button class="qty-btn inc-quarter" type="button">＋0.25</button>
        <button class="qty-btn inc-one" type="button">＋1</button>
      </div>
    </article>
  </template>

  <script type="module" src="./js/app.js?v=3.0"></script>
</body>
</html>
